<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
    <title>Интерактивное поздравление с 8 марта</title>
</head>
<body>
    <div class="container">
        <h1>🌸 Поздравление с 8 марта 🌸</h1>
        
        <div class="input-group">
            <label for="name">Введите имя:</label>
            <input type="text" id="name" placeholder="Например: Анна" autocomplete="off">
        </div>
        
        <div class="input-group">
            <label for="role">Кто вы для него?</label>
            <select id="role">
                <option value="мама">Мама</option>
                <option value="бабушка">Бабушка</option>
                <option value="сестра">Сестра</option>
                <option value="подруга">Подруга</option>
                <option value="коллега">Коллега</option>
                <option value="любимая">Любимая</option>
            </select>
        </div>

        <button onclick="generate()">Создать поздравление 🎉</button>

        <div id="output">
            <!-- Здесь будет отображаться результат -->
        </div>
    </div>
</body>
</html>
